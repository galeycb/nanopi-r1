# Description: Build OpenWrt using GitHub Actions
#
# 本版本用于对照测试：
# 1. 保留原有整体结构；
# 2. 仅将 swap-storage 改为 false，保留 Swap；
# 3. 编译仍使用 make -j$(nproc)；
# 4. 去掉自动单线程重试，避免掩盖首个失败原因；
# 5. 增加资源状态记录，便于判断是否为内存、Swap或磁盘问题。
#

name: Build_x86_64_test

on:
  repository_dispatch:
  workflow_dispatch:
    inputs:
      ssh:
        description: 'SSH connection to Actions'
        required: false
        default: 'false'
      config_name:
        description: 'Select .config file in configs/'
        required: true
        default: 'test_x86_64_min.config'
        type: choice
        options:
          - test_x86_64_min.config
          - test_n3450_x86_64_min_kmod-nft-compat.config
          - lean_orig_x64.config
      enable_wrtbwmon:
        description: '是否启用 wrtbwmon 插件'
        required: true
        default: 'false'
        type: choice
        options:
          - 'true'
          - 'false'

permissions:
  contents: write
  actions: write

env:
  REPO_URL: https://github.com/coolsnowwolf/lede
  REPO_BRANCH: master
  FEEDS_CONF: feeds.conf.default
  CONFIG_PATH: configs
  CONFIG_FILE: ${{ github.event.inputs.config_name }}
  DIY_P1_SH: ${{ github.event.inputs.enable_wrtbwmon == 'true' && 'diy-part1-wrtbwmon.sh' || 'diy-part1-nanopi-r1.sh' }}
  DIY_P2_SH: diy-part2.sh
  UPLOAD_BIN_DIR: false
  UPLOAD_FIRMWARE: true
  UPLOAD_COWTRANSFER: false
  UPLOAD_WETRANSFER: false
  UPLOAD_RELEASE: false
  TZ: Asia/Shanghai

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      - name: Free Disk Space (Ubuntu)
        uses: jlumbroso/free-disk-space@main
        with:
          tool-cache: true
          android: true
          dotnet: true
          haskell: true
          large-packages: true
          docker-images: true

          # 关键修改：false 表示不删除 Swap 所占用的磁盘空间。
          swap-storage: false

      # actions/checkout@v3 使用 Node.js 20，会触发弃用警告。
      # v5 已切换到 Node.js 24，适用于 GitHub 托管 Runner。
      # 如果以后改为自托管 Runner，需要确保 Runner 版本不低于 v2.327.1。
      - name: Checkout
        uses: actions/checkout@v5

      - name: Initialization environment
        env:
          DEBIAN_FRONTEND: noninteractive
        run: |
          sudo rm -rf /etc/apt/sources.list.d/* /usr/share/dotnet /usr/local/lib/android /opt/ghc
          sudo -E apt-get -qq update
          sudo -E apt-get -qq install $(curl -fsSL git.io/depends-ubuntu-2004)
          sudo -E apt-get -qq autoremove --purge
          sudo -E apt-get -qq clean
          sudo timedatectl set-timezone "$TZ"
          sudo mkdir -p /workdir
          sudo chown $USER:$GROUPS /workdir

      - name: Check runner resources
        run: |
          echo "===== CPU ====="
          nproc
          echo "===== Memory ====="
          free -h
          echo "===== Swap ====="
          swapon --show || true
          echo "===== Disk ====="
          df -hT

      - name: Clone source code
        working-directory: /workdir
        run: |
          df -hT $PWD
          git clone $REPO_URL -b $REPO_BRANCH openwrt
          ln -sf /workdir/openwrt $GITHUB_WORKSPACE/openwrt

          cd openwrt
          echo "===== LEDE source revision ====="
          git rev-parse HEAD
          git log -1 --oneline

      - name: Load custom feeds
        run: |
          [ -e $FEEDS_CONF ] && mv $FEEDS_CONF openwrt/feeds.conf.default
          chmod +x $DIY_P1_SH
          cd openwrt
          $GITHUB_WORKSPACE/$DIY_P1_SH

      - name: Update feeds
        run: cd openwrt && ./scripts/feeds update -a

      - name: Install feeds
        run: cd openwrt && ./scripts/feeds install -a

      - name: Load custom configuration
        run: |
          [ -e files ] && mv files openwrt/files
          [ -e ${CONFIG_PATH}/${CONFIG_FILE} ] && mv ${CONFIG_PATH}/${CONFIG_FILE} openwrt/.config
          chmod +x $DIY_P2_SH
          cd openwrt
          $GITHUB_WORKSPACE/$DIY_P2_SH

      - name: Set firmware suffix
        run: |
          case "${{ github.event.inputs.config_name }}" in
            test_x86_64_min.config)
              echo "CFG_SUFFIX=_min" >> $GITHUB_ENV
              ;;
            test_n3450_x86_64_min_kmod-nft-compat.config)
              echo "CFG_SUFFIX=_nft" >> $GITHUB_ENV
              ;;
            lean_orig_x64.config)
              echo "CFG_SUFFIX=_lean_orig" >> $GITHUB_ENV
              ;;
            *)
              echo "CFG_SUFFIX=" >> $GITHUB_ENV
              ;;
          esac

      - name: SSH connection to Actions
        uses: P3TERX/ssh2actions@v1.0.0
        if: (github.event.inputs.ssh == 'true' && github.event.inputs.ssh != 'false') || contains(github.event.action, 'ssh')
        env:
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}

      - name: Download package
        id: package
        run: |
          cd openwrt
          make defconfig
          make download -j8
          find dl -size -1024c -exec ls -l {} \;
          find dl -size -1024c -exec rm -f {} \;

          echo "===== Resources after download ====="
          free -h
          swapon --show || true
          df -hT
          du -sh dl build_dir staging_dir 2>/dev/null || true

      # ============================================================
      # 临时诊断步骤：每 60 秒输出一次资源状态。
      #
      # 当前建议：
      #   先保留此步骤，再连续成功编译 2～3 次。
      #
      # 后续精简方法：
      #   如果连续编译稳定，可把从下面的
      #     - name: Start resource monitor
      #   到该步骤末尾的整个 YAML 块删除。
      #
      # 删除本步骤不会影响 OpenWrt 编译，只会减少 Actions 日志。
      # 编译前、编译后的 free/swapon/df 检查仍会保留。
      # ============================================================
      - name: Start resource monitor
        run: |
          (
            while true; do
              echo "===== RESOURCE $(date -u '+%Y-%m-%d %H:%M:%S UTC') ====="
              free -h
              swapon --show || true
              df -h /
              uptime
              ps -eo pid,ppid,comm,%cpu,%mem,rss --sort=-rss | head -15
              sleep 60
            done
          ) &

      - name: Compile the firmware
        id: compile
        run: |
          cd openwrt

          echo "===== Compile settings ====="
          echo "$(nproc) thread compile"
          free -h
          swapon --show || true
          df -hT

          # 保留原来的全核编译方式。
          # 此处不再自动执行 make -j1 重试，确保首个失败原因清晰可见。
          make -j$(nproc)

          echo "status=success" >> $GITHUB_OUTPUT
          grep '^CONFIG_TARGET.*DEVICE.*=y' .config | sed -r 's/.*DEVICE_(.*)=y/\1/' > DEVICE_NAME
          [ -s DEVICE_NAME ] && echo "DEVICE_NAME=_$(cat DEVICE_NAME)" >> $GITHUB_ENV
          echo "FILE_DATE=_$(date +"%Y%m%d%H%M")" >> $GITHUB_ENV

      - name: Check space usage
        if: (!cancelled())
        run: |
          df -hT
          free -h
          swapon --show || true

      # 后续维护建议：
      # 若这里以后也出现 Node.js 20 警告，可将 @main 固定为 @v6。
      # 当前先不改动上传逻辑，以减少本次对照版本的变量。
      - name: Upload bin directory
        uses: actions/upload-artifact@main
        if: steps.compile.outputs.status == 'success' && env.UPLOAD_BIN_DIR == 'true'
        with:
          name: OpenWrt_bin${{ env.DEVICE_NAME }}${{ env.CFG_SUFFIX }}${{ env.FILE_DATE }}
          path: openwrt/bin

      - name: Organize files
        id: organize
        if: env.UPLOAD_FIRMWARE == 'true' && !cancelled()
        run: |
          cd openwrt/bin/targets/*/*
          rm -rf packages
          echo "FIRMWARE=$PWD" >> $GITHUB_ENV
          echo "status=success" >> $GITHUB_OUTPUT

      # 同上：如出现 upload-artifact 的 Node.js 20 警告，可改为 @v6。
      - name: Upload firmware directory
        uses: actions/upload-artifact@main
        if: steps.organize.outputs.status == 'success' && !cancelled()
        with:
          name: OpenWrt_firmware${{ env.DEVICE_NAME }}${{ env.CFG_SUFFIX }}${{ env.FILE_DATE }}
          path: ${{ env.FIRMWARE }}

      - name: Upload firmware to cowtransfer
        id: cowtransfer
        if: steps.organize.outputs.status == 'success' && env.UPLOAD_COWTRANSFER == 'true' && !cancelled()
        run: |
          curl -fsSL git.io/file-transfer | sh
          tar -czf firmware${CFG_SUFFIX}.tar.gz -C "$(dirname "$FIRMWARE")" "$(basename "$FIRMWARE")"
          ./transfer cow --block 2621440 -s -p 64 --no-progress firmware${CFG_SUFFIX}.tar.gz 2>&1 | tee cowtransfer.log
          echo "::warning file=cowtransfer.com::$(cat cowtransfer.log | grep https)"
          echo "url=$(cat cowtransfer.log | grep https | cut -f3 -d' ')" >> $GITHUB_OUTPUT

      - name: Upload firmware to WeTransfer
        id: wetransfer
        if: steps.organize.outputs.status == 'success' && env.UPLOAD_WETRANSFER == 'true' && !cancelled()
        run: |
          curl -fsSL git.io/file-transfer | sh
          tar -czf firmware${CFG_SUFFIX}.tar.gz -C "$(dirname "$FIRMWARE")" "$(basename "$FIRMWARE")"
          ./transfer wet -s -p 16 --no-progress firmware${CFG_SUFFIX}.tar.gz 2>&1 | tee wetransfer.log
          echo "::warning file=wetransfer.com::$(cat wetransfer.log | grep https)"
          echo "url=$(cat wetransfer.log | grep https | cut -f3 -d' ')" >> $GITHUB_OUTPUT

      - name: Generate release tag
        id: tag
        if: env.UPLOAD_RELEASE == 'true' && !cancelled()
        run: |
          echo "release_tag=$(date +"%Y.%m.%d-%H%M")${CFG_SUFFIX}" >> $GITHUB_OUTPUT
          touch release.txt
          [ $UPLOAD_COWTRANSFER = true ] && echo "🔗 [Cowtransfer](${{ steps.cowtransfer.outputs.url }})" >> release.txt
          [ $UPLOAD_WETRANSFER = true ] && echo "🔗 [WeTransfer](${{ steps.wetransfer.outputs.url }})" >> release.txt
          echo "status=success" >> $GITHUB_OUTPUT

      - name: Upload firmware to release
        uses: softprops/action-gh-release@v1
        if: steps.tag.outputs.status == 'success' && !cancelled()
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: ${{ steps.tag.outputs.release_tag }}
          body_path: release.txt
          files: ${{ env.FIRMWARE }}/*

      - name: Delete workflow runs
        uses: Mattraks/delete-workflow-runs@v2
        continue-on-error: true
        if: github.event_name != 'pull_request' && github.ref == 'refs/heads/master'
        with:
          token: ${{ github.token }}
          retain_days: 90
          keep_minimum_runs: 10
          delete_workflow_pattern: ^Build_x86_64_test$
          repository: ${{ github.repository }}

      - name: Remove old Releases
        uses: dev-drprasad/delete-older-releases@master
        if: env.UPLOAD_RELEASE == 'true' && !cancelled()
        with:
          keep_latest: 3
          delete_tags: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
